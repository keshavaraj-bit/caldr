<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caldr — Distributed AI Network</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b0f;
    --surface: #0d1117;
    --border: #1c2333;
    --accent: #00ff88;
    --accent2: #0088ff;
    --danger: #ff4455;
    --text: #e6edf3;
    --muted: #4a5568;
    --node: #1a2332;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 60px 1fr;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,11,15,0.9);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .stat { color: var(--text); }
  .stat span { color: var(--accent); }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .nodes-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .node-card {
    background: var(--node);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 11px;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .node-card.active { border-color: var(--accent); }
  .node-card.failing { border-color: var(--danger); }

  .node-id {
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .node-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    color: var(--muted);
  }

  .node-stats .val { color: var(--text); }

  .score-bar {
    margin-top: 8px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s ease;
  }

  .no-nodes {
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    padding: 20px;
    line-height: 1.8;
  }

  /* Main chat */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeUp 0.3s ease;
    max-width: 800px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.assistant { align-self: flex-start; }

  .message-meta {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .message.user .message-meta { color: var(--accent2); }

  .bubble {
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 680px;
  }

  .message.user .bubble {
    background: rgba(0,136,255,0.1);
    border: 1px solid rgba(0,136,255,0.2);
    color: var(--text);
  }

  .message.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    white-space: pre-wrap;
  }

  .message-footer {
    display: flex;
    gap: 12px;
    font-size: 10px;
    color: var(--muted);
  }

  .message-footer .node-tag {
    color: var(--accent);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-4px); opacity: 1; }
  }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
    text-align: center;
  }

  .welcome-title {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .welcome-sub {
    font-size: 12px;
    color: var(--muted);
    line-height: 2;
    max-width: 400px;
  }

  .welcome-features {
    display: flex;
    gap: 20px;
    margin-top: 8px;
  }

  .feature {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .feature::before {
    content: '▸';
    color: var(--accent);
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(8,11,15,0.8);
    backdrop-filter: blur(10px);
  }

  .model-select {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .model-select select {
    background: var(--node);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    resize: none;
    min-height: 48px;
    max-height: 160px;
    line-height: 1.6;
    transition: border-color 0.2s;
    overflow-y: auto;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    width: 48px;
    height: 48px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #00cc6e; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

  .hint {
    margin-top: 8px;
    font-size: 10px;
    color: var(--muted);
  }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 100px;
    right: 24px;
    background: rgba(255,68,85,0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 12px;
    z-index: 100;
    animation: fadeUp 0.3s ease;
  }
</style>
</head>
<body>
<div class="layout">
  <!-- Header -->
  <header>
    <div class="logo">caldr<span>.network</span></div>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div class="stat">nodes: <span id="nodeCount">0</span></div>
      <div class="stat">alive: <span id="aliveCount">0</span></div>
      <div class="stat">requests: <span id="requestCount">0</span></div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">⬡ active nodes</div>
    <div class="nodes-list" id="nodesList">
      <div class="no-nodes">
        No nodes online<br><br>
        Run node.py to<br>join the network
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div id="welcomeScreen" class="welcome">
      <div class="welcome-title">caldr</div>
      <div class="welcome-sub">
        Distributed AI inference network.<br>
        Free. Open source. Uncensored.<br>
        Owned by everyone.
      </div>
      <div class="welcome-features">
        <div class="feature">No cloud</div>
        <div class="feature">No cost</div>
        <div class="feature">No censorship</div>
      </div>
    </div>

    <div id="messages" class="messages" style="display:none"></div>

    <div class="input-area">
      <div class="model-select">
        model:
        <select id="modelSelect">
          <option value="phi3">phi3</option>
          <option value="llama3">llama3</option>
          <option value="mistral">mistral</option>
          <option value="gemma">gemma</option>
        </select>
      </div>
      <div class="input-row">
        <textarea
          id="promptInput"
          placeholder="Send a message to the network..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
      </div>
      <div class="hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </main>
</div>

<script>
  const SERVER = 'http://localhost:8000';
  let requestCount = 0;
  let isLoading = false;

  // ─── Auto-resize textarea ───
  const textarea = document.getElementById('promptInput');
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ─── Fetch node stats ───
  async function fetchNodes() {
    try {
      const [nodesRes, healthRes] = await Promise.all([
        fetch(`${SERVER}/nodes`),
        fetch(`${SERVER}/health`)
      ]);
      const nodes = await nodesRes.json();
      const health = await healthRes.json();

      document.getElementById('nodeCount').textContent = health.total_nodes || 0;
      document.getElementById('aliveCount').textContent = health.alive_nodes || 0;

      renderNodes(nodes);
    } catch (e) {
      document.getElementById('statusDot').style.background = '#ff4455';
      document.getElementById('statusDot').style.boxShadow = '0 0 8px #ff4455';
    }
  }

  function renderNodes(nodes) {
    const list = document.getElementById('nodesList');
    const entries = Object.entries(nodes);

    if (entries.length === 0) {
      list.innerHTML = `<div class="no-nodes">No nodes online<br><br>Run node.py to<br>join the network</div>`;
      return;
    }

    list.innerHTML = entries.map(([id, node]) => {
      const score = node.score || 0;
      const scoreWidth = Math.min(score * 60, 100);
      const isActive = node.status === 'online';
      const isFailing = node.status === 'failing';

      return `
        <div class="node-card ${isActive ? 'active' : ''} ${isFailing ? 'failing' : ''}">
          <div class="node-id">${id.substring(0, 24)}...</div>
          <div class="node-stats">
            <div>vram</div><div class="val">${node.free_vram_mb}mb</div>
            <div>ping</div><div class="val">${Math.round(node.ping_ms)}ms</div>
            <div>score</div><div class="val">${score.toFixed(3)}</div>
            <div>model</div><div class="val">${node.model}</div>
          </div>
          <div class="score-bar">
            <div class="score-fill" style="width:${scoreWidth}%"></div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ─── Send message ───
  async function sendMessage() {
    const input = document.getElementById('promptInput');
    const prompt = input.value.trim();
    if (!prompt || isLoading) return;

    const model = document.getElementById('modelSelect').value;

    // Show chat, hide welcome
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';

    // Add user message
    addMessage('user', prompt);
    input.value = '';
    input.style.height = 'auto';

    // Show typing
    const typingId = showTyping();
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    try {
      const start = Date.now();
      const res = await fetch(`${SERVER}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, model })
      });

      const data = await res.json();
      removeTyping(typingId);

      if (data.detail) {
        showToast(data.detail);
        addMessage('assistant', '⚠ ' + data.detail, null);
      } else {
        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        requestCount++;
        document.getElementById('requestCount').textContent = requestCount;
        addMessage('assistant', data.response, {
          node: data.served_by,
          ping: data.ping_ms,
          score: data.score,
          attempts: data.attempts,
          elapsed
        });
      }
    } catch (e) {
      removeTyping(typingId);
      showToast('Network error — is the server running?');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function addMessage(role, text, meta) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const metaLabel = role === 'user' ? 'you' : 'caldr network';
    let footer = '';

    if (meta && role === 'assistant') {
      footer = `
        <div class="message-footer">
          <span class="node-tag">${meta.node ? meta.node.substring(0, 20) + '...' : 'unknown'}</span>
          <span>${meta.ping}ms</span>
          <span>score: ${meta.score}</span>
          ${meta.attempts > 1 ? `<span style="color:var(--danger)">⚡ ${meta.attempts} attempts</span>` : ''}
          <span>${meta.elapsed}s</span>
        </div>
      `;
    }

    div.innerHTML = `
      <div class="message-meta">${metaLabel}</div>
      <div class="bubble">${escapeHtml(text)}</div>
      ${footer}
    `;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = id;
    div.innerHTML = `
      <div class="message-meta">caldr network</div>
      <div class="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  // ─── Poll node stats every 3 seconds ───
  fetchNodes();
  setInterval(fetchNodes, 3000);
</script>
</body>
</html>
